  #     interval: "weekly"
  #   groups:
  #     rules-python:
  #       patterns:
  #         - "rules_python*"
  #   # cooldown:
  #   #   default-days: 7

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
